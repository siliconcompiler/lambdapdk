[build-system]
requires = [
    "setuptools >= 80",
    "setuptools_scm[toml] >= 8"
]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
write_to = "lambdapdk/_version.py"
write_to_template = '''
# This file is automatically generated by setuptools_scm.
# Do not edit it directly.

__version__ = "{version}"
__base_version__ = "{scm_version.tag}"
__git_commit__ = "{scm_version.node}"
'''

[project]
name = "lambdapdk"
authors = [{name = "Zero ASIC"}]
description = "Library of open source Process Design Kits"
readme = "README.md"
urls = {Homepage = "https://github.com/siliconcompiler/lambdapdk"}
requires-python = ">= 3.8"
license = "Apache-2.0"
license-files = ["LICENSE"]
dependencies = [
    "siliconcompiler >= 0.35.0",
    "lambdalib >= 0.12.0"
]
dynamic = ['version']

[project.entry-points."siliconcompiler.docs"]
linkcode = "lambdapdk:get_docs_codeurl"

[tool.pytest.ini_options]
testpaths = "tests"
timeout = "180"

[project.optional-dependencies]
# Test dependencies.
test = [
    "flake8 == 7.3.0",
    "pytest == 9.1.1",
    "pytest-timeout == 2.4.0",
    "tclint == 0.8.0",
    "sc-leflib == 0.5.1",
    "Jinja2 == 3.1.6"
]

[tool.tclint]
exclude = [
    'build',
    'scripts/build',
    'dist',
    '.venv/',
    # scripts from other repos
    'lambdapdk/asap7/base/apr/example_innovus.tcl',
    'lambdapdk/sky130/base/setup/netgen/lvs_setup.tcl',
    'lambdapdk/gf180/base/setup/netgen/gf180mcuA_setup.tcl',
    'lambdapdk/gf180/base/setup/netgen/setup.tcl',
    'lambdapdk/gf180/base/setup/netgen/lvs_setup.tcl',
    'lambdapdk/gf180/base/setup/magic/gf180mcuA.tcl'
]

[tool.tclint.style]
line-length = 100
